MEMORY {
    HEADER: file = %O, start = $0000, size = $0002;
    LOAD:   file = %O, start = $0801, size = $CFFF;
}

SEGMENTS {
    EXEHDR:  load = HEADER, type = ro;
    STARTUP: load = LOAD,   type = ro;
    CODE:    load = LOAD,   type = ro;
    RODATA:  load = LOAD,   type = ro;
    DATA:    load = LOAD,   type = rw;
    BSS:     load = LOAD,   type = bss, define = yes;
}
