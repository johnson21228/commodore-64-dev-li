MEMORY {
    LOADADDR: file = %O, start = $0000, size = $0002;
    BASIC:    file = %O, start = $0801, size = $000c;
    RAM:      file = %O, start = $080d, size = $c7f3;
}

SEGMENTS {
    LOADADDR: load = LOADADDR, type = ro;
    EXEHDR:   load = BASIC,    type = ro;
    CODE:     load = RAM,      type = ro;
}
